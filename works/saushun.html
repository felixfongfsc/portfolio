<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SauShun — Felix Fong</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="nav__logo" href="../index.html">Felix Fong</a>
      <button class="nav__toggle" aria-expanded="false" aria-controls="nav-links">
        <span class="sr-only">Menu</span>
        <span class="nav__hamburger" aria-hidden="true"></span>
      </button>
      <ul class="nav__links" id="nav-links" role="list">
        <li><a class="nav__link" href="../index.html#home">Home</a></li>
        <li><a class="nav__link" href="../index.html#about">About</a></li>
        <li><a class="nav__link nav__link--active" href="../index.html#works">Works</a></li>
        <li><a class="nav__link" href="../index.html#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="case-study-page">
    <article class="case-study">

      <!-- ===================== TITLE — populated by casestudy.js ===================== -->
      <header class="cs-header">
        <div class="cs-header__inner">
          <p class="cs-header__discipline"></p>
          <h1 class="cs-title"></h1>
          <p class="cs-header__caption"></p>
        </div>
      </header>

      <!-- ===================== HERO: SLIDESHOW + OVERVIEW ===================== -->
      <div class="cs-hero">
        <div class="cs-hero__inner">

          <!-- Left: slideshow — built by casestudy.js -->
          <div class="cs-slideshow" aria-label="Project images"></div>

          <!-- Right: overview panel — meta-grid populated by casestudy.js -->
          <aside class="cs-overview" aria-labelledby="cs-overview-heading">
            <h2 id="cs-overview-heading" class="cs-overview__title">Project Overview</h2>
            <dl class="meta-grid"></dl>
          </aside>

        </div><!-- /.cs-hero__inner -->
      </div><!-- /.cs-hero -->

      <!-- ===================== TABS ===================== -->
      <div class="cs-tabs">
        <div class="cs-tabs__bar" role="tablist" aria-label="Case study sections">
          <button class="cs-tabs__tab cs-tabs__tab--active" role="tab" aria-selected="true"  aria-controls="tab-gallery" id="btn-gallery">Gallery</button>
          <button class="cs-tabs__tab"                       role="tab" aria-selected="false" aria-controls="tab-process" id="btn-process">Process</button>
        </div>

        <!-- GALLERY TAB — populated by casestudy.js -->
        <div class="cs-tabs__panel" id="tab-gallery" role="tabpanel" aria-labelledby="btn-gallery">
          <div class="cs-gallery"></div>
        </div>

        <!-- PROCESS TAB -->
        <div class="cs-tabs__panel cs-tabs__panel--hidden" id="tab-process" role="tabpanel" aria-labelledby="btn-process">

          <!-- The Problem -->
          <section class="cs-section cs-problem" aria-labelledby="cs-problem-heading">
            <h2 id="cs-problem-heading" class="cs-section-title">The Problem</h2>
            <p class="cs-narrative">
              TEMP
          </section>

          <!-- Ideation -->
          <section class="cs-section cs-ideation" aria-labelledby="cs-ideation-heading">
            <h2 id="cs-ideation-heading" class="cs-section-title">Ideation &amp; Exploration</h2>
            <p class="cs-narrative">
              TEMP
            </p>
          </section>

          <!-- The Work -->
          <section class="cs-section cs-work" aria-labelledby="cs-work-heading">
            <h2 id="cs-work-heading" class="cs-section-title">The Work</h2>
            <p class="cs-narrative">
              TEMP
            </p>
          </section>

        </div><!-- /#tab-process -->
      </div><!-- /.cs-tabs -->

    </article>
  </main>

  <script src="../js/data/projects.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/lightbox.js"></script>
  <script src="../js/casestudy.js"></script>
</body>
</html>
